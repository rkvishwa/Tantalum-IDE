<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" width="300" height="100">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&amp;display=swap');
      .logo-text { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 54px; letter-spacing: -2px; }
      .k      { fill: #ffffff; }
      .nurdz  { fill: #6b7280; }
      .usc    { fill: #22c55e; }
      .bg     { fill: #000000; }
      .primary { fill: #ffffff; }
      .accent { fill: #22c55e; }

      @media (prefers-color-scheme: light) {
        .k      { fill: #000000; }
        .bg     { fill: #ffffff; }
        .primary { fill: #000000; }
      }
    </style>
  </defs>

  <!-- Owl mascot (simplified and scaled) -->
  <g transform="translate(42, 50) scale(0.069) translate(-512, -494)">
    <!-- Top head / brow -->
    <path class="primary" d="
      M 258 272
      Q 512 160 766 272
      Q 720 298 694 336
      Q 792 270 878 238
      Q 979 198 1008 68
      Q 1026 220 953 306
      Q 998 294 1020 268
      Q 980 365 846 431
      Q 690 507 557 611
      Q 523 635 512 621
      Q 501 635 467 611
      Q 334 507 178 431
      Q 44 365 4 268
      Q 26 294 71 306
      Q -2 220 16 68
      Q 45 198 146 238
      Q 232 270 330 336
      Q 304 298 258 272
      Z
    "/>

    <!-- Left face ring -->
    <path class="primary" d="
      M 76 404
      Q 31 481 31 576
      Q 31 708 118 795
      Q 220 896 430 847
      Q 297 847 204 783
      Q 93 707 93 576
      Q 93 496 129 437
      Z
    "/>

    <!-- Right face ring -->
    <path class="primary" d="
      M 948 404
      Q 993 481 993 576
      Q 993 708 906 795
      Q 804 896 594 847
      Q 727 847 820 783
      Q 931 707 931 576
      Q 931 496 895 437
      Z
    "/>

    <!-- Left inner eye ring -->
    <path class="primary" d="
      M 171 463
      Q 147 505 147 556
      Q 147 636 202 691
      Q 267 756 388 706
      Q 315 706 267 670
      Q 217 633 217 556
      Q 217 515 241 478
      Z
    "/>

    <!-- Right inner eye ring -->
    <path class="primary" d="
