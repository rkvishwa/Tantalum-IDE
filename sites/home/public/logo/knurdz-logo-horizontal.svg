      Q 877 505 877 556
      Q 877 636 822 691
      Q 757 756 636 706
      Q 709 706 757 670
      Q 807 633 807 556
      Q 807 515 783 478
      Z
    "/>

    <!-- Pupils with accent -->
    <g class="accent">
