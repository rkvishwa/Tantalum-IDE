        M 266 512
        Q 222 556 262 607
        Q 306 648 359 619
        Q 392 599 376 582
        Q 343 554 266 512
        Z
      "/>
      <path d="
        M 758 512
        Q 802 556 762 607
        Q 718 648 665 619
        Q 632 599 648 582
        Q 681 554 758 512
        Z
      "/>
