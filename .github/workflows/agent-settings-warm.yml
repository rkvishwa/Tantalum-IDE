name: Agent Settings Warm Check

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  warm:
    name: Warm agent-settings
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Call Appwrite warm route
        env:
          APPWRITE_ENDPOINT: https://api.metl.run/v1
          APPWRITE_PROJECT_ID: tantalum
          AGENT_SETTINGS_FUNCTION_ID: agent-settings
        run: |
          set -euo pipefail
          response="$(
            curl --fail --show-error --silent --max-time 25 \
              -X POST \
              -H "X-Appwrite-Project: ${APPWRITE_PROJECT_ID}" \
              -H "X-Appwrite-Response-Format: 1.4.0" \
              -H "Content-Type: application/json" \
              --data '{"body":"{\"reason\":\"github-actions\"}","async":false,"path":"/warm","method":"POST","headers":{"content-type":"application/json"}}' \
              "${APPWRITE_ENDPOINT%/}/functions/${AGENT_SETTINGS_FUNCTION_ID}/executions"
          )"
          echo "$response" | jq .
          status="$(echo "$response" | jq -r '.status // ""')"
          response_status_code="$(echo "$response" | jq -r '.responseStatusCode // 0')"
          if [[ "$status" != "completed" || "$response_status_code" != "200" ]]; then
            echo "agent-settings warm check failed: status=$status responseStatusCode=$response_status_code" >&2
            exit 1
          fi
      - name: Verify async execution path
        env:
          APPWRITE_ENDPOINT: https://api.metl.run/v1
          APPWRITE_PROJECT_ID: tantalum
          AGENT_SETTINGS_FUNCTION_ID: agent-settings
          APPWRITE_MONITOR_API_KEY: ${{ secrets.APPWRITE_MONITOR_API_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${APPWRITE_MONITOR_API_KEY}" ]]; then
            echo "APPWRITE_MONITOR_API_KEY secret is not configured; skipping async execution polling."
            exit 0
          fi

          response="$(
            curl --fail --show-error --silent --max-time 15 \
              -X POST \
              -H "X-Appwrite-Project: ${APPWRITE_PROJECT_ID}" \
              -H "X-Appwrite-Key: ${APPWRITE_MONITOR_API_KEY}" \
              -H "X-Appwrite-Response-Format: 1.4.0" \
              -H "Content-Type: application/json" \
              --data '{"body":"{\"reason\":\"github-actions-async\"}","async":true,"path":"/warm","method":"POST","headers":{"content-type":"application/json"}}' \
              "${APPWRITE_ENDPOINT%/}/functions/${AGENT_SETTINGS_FUNCTION_ID}/executions"
          )"
          echo "$response" | jq .
          execution_id="$(echo "$response" | jq -r '."$id" // .id // ""')"
          if [[ -z "$execution_id" ]]; then
            echo "Appwrite did not return an execution ID for async warm." >&2
            exit 1
          fi

          deadline=$((SECONDS + 95))
          status=""
          response_status_code="0"
          while (( SECONDS < deadline )); do
            poll_response="$(
              curl --fail --show-error --silent --max-time 15 \
                -H "X-Appwrite-Project: ${APPWRITE_PROJECT_ID}" \
                -H "X-Appwrite-Key: ${APPWRITE_MONITOR_API_KEY}" \
                -H "X-Appwrite-Response-Format: 1.4.0" \
                "${APPWRITE_ENDPOINT%/}/functions/${AGENT_SETTINGS_FUNCTION_ID}/executions/${execution_id}"
            )"
            status="$(echo "$poll_response" | jq -r '.status // ""')"
            response_status_code="$(echo "$poll_response" | jq -r '.responseStatusCode // 0')"
            echo "async warm status=$status responseStatusCode=$response_status_code"
            if [[ "$status" == "completed" || "$status" == "failed" || "$status" == "timeout" ]]; then
              break
            fi
            sleep 2
          done

          if [[ "$status" != "completed" || "$response_status_code" != "200" ]]; then
            echo "agent-settings async warm failed: status=${status:-waiting} responseStatusCode=$response_status_code" >&2
            exit 1
          fi
